<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>JsCRM — Symbol Explorer</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { margin: 0; background: #f5f5f5; display: flex; height: 100vh; }
    .sidebar { width: 220px; background: #fff; border-right: 1px solid #ddd; padding: 16px; display: flex; flex-direction: column; }
    .sidebar h1 { font-size: 16px; margin: 0 0 16px; color: #333; }
    .tab { padding: 8px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; color: #555; font-size: 14px; }
    .tab:hover { background: #f0f0f0; }
    .tab.active { background: #4A90D9; color: #fff; }
    .main { flex: 1; padding: 24px; overflow-y: auto; }
    .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
    h2 { font-size: 18px; margin: 0 0 16px; color: #333; }
    input[type="text"], input[type="search"], textarea { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
    input[type="text"]:focus, input[type="search"]:focus { border-color: #4A90D9; }
    button { padding: 8px 20px; font-size: 14px; background: #4A90D9; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #357ABD; }
    button:active { background: #2A5F9E; }
    .symbol-list { margin-top: 12px; }
    .symbol-item { padding: 6px 8px; border-radius: 4px; cursor: default; font-size: 13px; display: flex; justify-content: space-between; }
    .symbol-item:nth-child(even) { background: #fafafa; }
    .symbol-item .kind { font-size: 11px; color: #999; background: #eee; padding: 2px 6px; border-radius: 3px; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 3px; margin-left: 6px; }
    .badge.module { background: #e3f2fd; color: #1565c0; }
    .badge.function { background: #e8f5e9; color: #2e7d32; }
    .badge.procedure { background: #fff3e0; color: #e65100; }
    .badge.catalog { background: #fce4ec; color: #c62828; }
    .badge.document { background: #f3e5f5; color: #6a1b9a; }
    .badge.enumeration { background: #e0f2f1; color: #00695c; }
    .result-box { background: #263238; color: #e0e0e0; padding: 12px 16px; border-radius: 6px; font-family: monospace; font-size: 13px; margin-top: 12px; white-space: pre-wrap; overflow-x: auto; }
    .error { color: #ef5350; }
    .count { font-size: 12px; color: #999; margin-top: 8px; }
    .status-bar { padding: 8px 16px; background: #e8f5e9; color: #2e7d32; font-size: 13px; border-top: 1px solid #c8e6c9; text-align: center; }
    .module-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
    .module-item:hover { background: #f5f5f5; }
    .meta-section { margin-bottom: 16px; }
    .meta-section h3 { font-size: 14px; color: #666; margin: 0 0 8px; }
    .meta-item { padding: 4px 0; font-size: 13px; }
    textarea { font-family: monospace; font-size: 13px; min-height: 60px; resize: vertical; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>JsCRM Explorer</h1>
    <div class="tab active" data-tab="symbols">Symbols</div>
    <div class="tab" data-tab="modules">Modules</div>
    <div class="tab" data-tab="metadata">Metadata</div>
    <div class="tab" data-tab="run">Run</div>
    <div class="tab" data-tab="ir">IR Viewer</div>
    <div class="tab" data-tab="graph">Graph</div>
  </div>
  <div class="main">
    <div id="tab-symbols" class="tab-content active">
      <div class="card">
        <h2>Symbols</h2>
        <input type="search" id="symbol-search" placeholder="Поиск..." oninput="searchSymbols()" />
        <div id="symbol-list" class="symbol-list"></div>
        <div id="symbol-count" class="count"></div>
      </div>
    </div>
    <div id="tab-modules" class="tab-content">
      <div class="card">
        <h2>Modules</h2>
        <div id="module-list"></div>
      </div>
    </div>
    <div id="tab-metadata" class="tab-content">
      <div class="card" id="metadata-content"></div>
    </div>
    <div id="tab-run" class="tab-content">
      <div class="card">
        <h2>Run Function</h2>
        <input type="text" id="run-name" placeholder="Имя функции" /><br/><br/>
        <textarea id="run-args" placeholder="Аргументы (JSON массив, опционально)"></textarea><br/><br/>
        <button onclick="runFunction()">Выполнить</button>
        <div id="run-result" class="result-box" style="display:none"></div>
        <div id="run-error" class="result-box error" style="display:none"></div>
      </div>
    </div>
    <div id="tab-ir" class="tab-content">
      <div class="card">
        <h2>IR Viewer</h2>
        <input type="text" id="ir-search" placeholder="Имя модуля..." oninput="loadIR()" />
        <div id="ir-output" class="result-box" style="display:none"></div>
      </div>
    </div>
    <div id="tab-graph" class="tab-content">
      <div class="card">
        <h2>Call Graph</h2>
        <input type="text" id="graph-search" placeholder="Имя функции..." oninput="loadGraph()" />
        <div id="graph-output" class="result-box" style="display:none"></div>
      </div>
      <div class="card">
        <h2>Unused Functions</h2>
        <label><input type="checkbox" id="graph-include-tests" onchange="loadUnused()" /> Include tests</label>
        <label style="margin-left:12px"><input type="checkbox" id="graph-include-entrypoints" onchange="loadUnused()" /> Include entrypoints</label>
        <div id="graph-unused-output" class="result-box" style="display:none"></div>
      </div>
    </div>
  </div>

  <script>
    let allSymbols = [];
    let allModules = [];

    async function api(path) {
      const res = await fetch(path);
      return res.json();
    }

    async function init() {
      allSymbols = await api("/api/symbols");
      const status = await api("/api/status");
      allModules = await api("/api/modules");

      renderSymbols(allSymbols);
      renderModules();
      renderMetadata();
      document.getElementById("symbol-count").textContent = "v" + status.version + " — " + status.symbols + " symbols, " + status.routines + " routines, " + status.modules + " modules, " + status.graphNodes + " graph nodes, " + status.attributes + " attrs";
      loadUnused();
    }

    function renderSymbols(list) {
      const el = document.getElementById("symbol-list");
      el.innerHTML = list.map(s =>
        '<div class="symbol-item"><span>' + esc(s.name) + (s.moduleName ? ' <span style="color:#999;font-size:11px">(' + esc(s.moduleName) + ')</span>' : '') + '</span><span class="badge ' + s.kind + '">' + s.kind + '</span></div>'
      ).join("");
    }

    function searchSymbols() {
      const q = document.getElementById("symbol-search").value;
      if (!q) { renderSymbols(allSymbols); return; }
      const lower = q.toLowerCase();
      renderSymbols(allSymbols.filter(s => s.name.toLowerCase().includes(lower)));
    }

    function renderModules() {
      const el = document.getElementById("module-list");
      el.innerHTML = allModules.map(m =>
        '<div class="module-item" onclick="showModule(\'' + esc(m.name) + '\')">' + esc(m.name) + ' <span style="color:#999;font-size:12px">(' + m.routineCount + ' routines)</span></div>'
      ).join("");
    }

    async function showModule(name) {
      const data = await api("/api/modules/" + encodeURIComponent(name));
      const el = document.getElementById("ir-output");
      el.style.display = "block";
      el.textContent = JSON.stringify(data, null, 2);

      document.querySelector('[data-tab="ir"]').click();
      document.getElementById("ir-search").value = name;
    }

    async function renderMetadata() {
      const data = await api("/api/metadata");
      let html = "";
      if (data.commonModules && data.commonModules.length) {
        html += '<div class="meta-section"><h3>Общие модули (' + data.commonModules.length + ')</h3>';
        data.commonModules.forEach(m => html += '<div class="meta-item">' + esc(m.name) + '</div>');
        html += '</div>';
      }
      if (data.catalogs && data.catalogs.length) {
        html += '<div class="meta-section"><h3>Справочники (' + data.catalogs.length + ')</h3>';
        data.catalogs.forEach(c => html += '<div class="meta-item" style="cursor:pointer;color:#4A90D9" onclick="showDetail(\'' + esc(c.name) + '\',\'catalog\')">' + esc(c.name) + ' <span style="font-size:11px;color:#999">▼</span></div>');
        html += '</div>';
      }
      if (data.documents && data.documents.length) {
        html += '<div class="meta-section"><h3>Документы (' + data.documents.length + ')</h3>';
        data.documents.forEach(d => html += '<div class="meta-item" style="cursor:pointer;color:#4A90D9" onclick="showDetail(\'' + esc(d.name) + '\',\'document\')">' + esc(d.name) + ' <span style="font-size:11px;color:#999">▼</span></div>');
        html += '</div>';
      }
      if (data.enumerations && data.enumerations.length) {
        html += '<div class="meta-section"><h3>Перечисления (' + data.enumerations.length + ')</h3>';
        data.enumerations.forEach(e => html += '<div class="meta-item">' + esc(e.name) + '</div>');
        html += '</div>';
      }
      html += '<div id="meta-detail" style="display:none"></div>';
      document.getElementById("metadata-content").innerHTML = html;
    }

    async function showDetail(name, kind) {
      const attrs = await api("/api/metadataIndex?parent=" + encodeURIComponent(name) + "&kind=attributes");
      const tabs = await api("/api/metadataIndex?parent=" + encodeURIComponent(name) + "&kind=tabularSections");
      const forms = await api("/api/metadataIndex?parent=" + encodeURIComponent(name) + "&kind=forms");
      const cmds = await api("/api/metadataIndex?parent=" + encodeURIComponent(name) + "&kind=commands");
      let html = '<div class="card" style="margin-top:8px"><h3 style="font-size:14px;margin:0 0 8px">' + esc(name) + ' — атрибуты</h3>';
      if (attrs.length) {
        html += attrs.map(a => '<div class="meta-item" style="font-size:12px">' + esc(a.attribute.name) + ' <span style="color:#999">' + typeLabel(a.attribute.type) + (a.attribute.required ? ' *' : '') + '</span></div>').join("");
      } else {
        html += '<div class="meta-item" style="color:#999;font-size:12px">(нет реквизитов)</div>';
      }
      if (tabs.length) {
        tabs.forEach(t => {
          html += '<h4 style="font-size:13px;margin:8px 0 4px">ТЧ ' + esc(t.section.name) + '</h4>';
          t.section.attributes.forEach(a => html += '<div class="meta-item" style="font-size:12px;padding-left:12px">' + esc(a.name) + ' <span style="color:#999">' + typeLabel(a.type) + '</span></div>');
        });
      }
      if (forms.length) {
        html += '<h4 style="font-size:13px;margin:8px 0 4px">Формы</h4>';
        forms.forEach(f => html += '<div class="meta-item" style="font-size:12px">' + esc(f.form.name) + ' (' + f.form.type + ')</div>');
      }
      if (cmds.length) {
        html += '<h4 style="font-size:13px;margin:8px 0 4px">Команды</h4>';
        cmds.forEach(c => html += '<div class="meta-item" style="font-size:12px">' + esc(c.command.name) + '</div>');
      }
      html += '</div>';
      const el = document.getElementById("meta-detail");
      el.innerHTML = html;
      el.style.display = "block";
    }

    function typeLabel(t) {
      if (typeof t === "string") return t;
      if (t.kind === "string") return "Строка" + (t.length ? "(" + t.length + ")" : "");
      if (t.kind === "number") return "Число(" + (t.precision||0) + "," + (t.scale||0) + ")";
      if (t.kind === "date") return "Дата";
      if (t.kind === "boolean") return "Булево";
      if (t.kind === "ref") return "Ссылка: " + t.target;
      if (t.kind === "enum") return "Перечисление: " + t.target;
      if (t.kind === "union") return "Составной (" + t.options.length + ")";
      return JSON.stringify(t);
    }

    async function runFunction() {
      const name = document.getElementById("run-name").value.trim();
      if (!name) return;
      let args = [];
      try {
        const raw = document.getElementById("run-args").value.trim();
        if (raw) args = JSON.parse(raw);
      } catch {
        showRunError("Invalid JSON in arguments");
        return;
      }
      const res = await fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, args })
      });
      const data = await res.json();
      if (data.success) {
        const el = document.getElementById("run-result");
        el.style.display = "block";
        el.textContent = JSON.stringify(data.result, null, 2);
        document.getElementById("run-error").style.display = "none";
      } else {
        showRunError(data.error);
      }
    }

    function showRunError(msg) {
      const el = document.getElementById("run-error");
      el.style.display = "block";
      el.textContent = "Error: " + msg;
      document.getElementById("run-result").style.display = "none";
    }

    async function loadGraph() {
      const name = document.getElementById("graph-search").value.trim();
      const el = document.getElementById("graph-output");
      if (!name) { el.style.display = "none"; return; }
      const data = await api("/api/graph?name=" + encodeURIComponent(name));
      if (data && data.callees) {
        el.style.display = "block";
        let txt = "Callees (calls):\n";
        if (data.callees.length) txt += data.callees.map(n => "  " + n).join("\n");
        else txt += "  (none)";
        txt += "\n\nCallers (called by):\n";
        if (data.callers.length) txt += data.callers.map(n => "  " + n).join("\n");
        else txt += "  (none)";
        el.textContent = txt;
      } else {
        el.style.display = "none";
      }
    }

    async function loadUnused() {
      const includeTests = document.getElementById("graph-include-tests").checked;
      const includeEntrypoints = document.getElementById("graph-include-entrypoints").checked;
      const data = await api("/api/graph/unused?includeTests=" + includeTests + "&includeEntrypoints=" + includeEntrypoints);
      const el = document.getElementById("graph-unused-output");
      if (data.unused && data.unused.length) {
        el.style.display = "block";
        el.textContent = data.unused.length + " unused functions:\n" + data.unused.map(n => "  " + n).join("\n");
      } else {
        el.style.display = "block";
        el.textContent = "No unused functions found.";
      }
    }

    async function loadIR() {
      const name = document.getElementById("ir-search").value.trim();
      const el = document.getElementById("ir-output");
      if (!name) { el.style.display = "none"; return; }
      const data = await api("/api/ir/" + encodeURIComponent(name));
      if (data && !data.error) {
        el.style.display = "block";
        el.textContent = JSON.stringify(data, null, 2);
      } else {
        el.style.display = "none";
      }
    }

    function esc(s) { if (!s) return ""; return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
      });
    });

    init();
  </script>
</body>
</html>
